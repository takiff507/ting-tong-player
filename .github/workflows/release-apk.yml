name: Publish APK release

on:
  push:
    branches: ["main"]
    paths:
      - "ting_tong_player_safe.apk"
      - ".github/workflows/release-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Publish APK to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
          APK_NAME: ting_tong_player_safe.apk
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          tag_name="apk-${short_sha}"
          release_title="Ting Tong Player Safe APK (${short_sha})"

          cat > release-notes.md <<'NOTES'
          Official Ting Tong Player APK download.

          - Safe app build for the official website
          - Privacy-first player with no hidden telemetry
          - Download counts are stored by GitHub Releases
          - Website redeploys do not reset release download history

          Always download from the official website or this GitHub repository.
          NOTES

          git tag "${tag_name}" "${GITHUB_SHA}" 2>/dev/null || true
          git push origin "refs/tags/${tag_name}" || true

          if gh release view "${tag_name}" >/dev/null 2>&1; then
            gh release upload "${tag_name}" "${APK_NAME}" --clobber
            gh release edit "${tag_name}" --title "${release_title}" --notes-file release-notes.md --latest
          else
            gh release create "${tag_name}" "${APK_NAME}" --title "${release_title}" --notes-file release-notes.md --latest
          fi
